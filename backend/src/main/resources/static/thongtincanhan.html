<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/bocuc.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modern.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <header class="tieu-de shadow-sm" include-html="/components/header.html"></header>
        
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center mb-4 fw-bold">Hồ sơ cá nhân</h2>
                        <div id="error-msg" class="alert alert-danger" style="display: none;"></div>
                        <div id="success-msg" class="alert alert-success" style="display: none;">Cập nhật thông tin thành công!</div>
                        <form id="profileForm" onsubmit="updateProfile(event)">
                            <input type="hidden" id="userId">
                            <div class="mb-3"><label class="form-label fw-bold">Username</label><input type="text" id="p_username" class="form-control bg-light" required readonly></div>
                            <div class="mb-3"><label class="form-label fw-bold">Email</label><input type="email" id="p_email" class="form-control bg-light" required readonly></div>
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0"><label class="form-label fw-bold">Họ đệm</label><input type="text" id="p_lastname" class="form-control"></div>
                                <div class="col-md-6"><label class="form-label fw-bold">Tên</label><input type="text" id="p_firstname" class="form-control"></div>
                            </div>
                            <div class="mb-3"><label class="form-label fw-bold">Số điện thoại</label><input type="text" id="p_phone" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label fw-bold">Địa chỉ</label><input type="text" id="p_address" class="form-control"></div>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary w-50" onclick="loadProfile()"><i class="bi bi-x-circle me-2"></i>Hủy</button>
                                <button type="submit" class="btn btn-primary w-50"><i class="bi bi-save me-2"></i>Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/service.js"></script>
    <script src="js/chung.js"></script>
    <script src="js/thongtincanhan.js"></script>
</body>
</html>
