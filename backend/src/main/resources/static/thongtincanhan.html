<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/bocuc.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .profile-container h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-save:hover {
            background: #0056b3;
        }
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #6c757d;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-reset:hover {
            background: #5a6268;
        }
        .msg-box {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
            text-align: center;
        }
        .error-message { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success-message { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="than">
        <div class="tieu-de" include-html="/components/header.html"></div>
        
        <div class="noi-dung">
            <div class="profile-container">
                <h2>Hồ sơ cá nhân</h2>
                <div id="error-msg" class="msg-box error-message"></div>
                <div id="success-msg" class="msg-box success-message">Cập nhật thông tin thành công!</div>
                <form id="profileForm" onsubmit="updateProfile(event)">
                    <input type="hidden" id="userId">
                    <div class="form-group"><label>Username</label><input type="text" id="p_username" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="p_email" required></div>
                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;"><label>Họ đệm</label><input type="text" id="p_lastname"></div>
                        <div class="form-group" style="flex: 1;"><label>Tên</label><input type="text" id="p_firstname"></div>
                    </div>
                    <div class="form-group"><label>Số điện thoại</label><input type="text" id="p_phone" required></div>
                    <div class="form-group"><label>Địa chỉ</label><input type="text" id="p_address"></div>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-reset" onclick="loadProfile()">Hủy thay đổi</button>
                        <button type="submit" class="btn-save">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/service.js"></script>
    <script src="js/chung.js"></script>
    <script src="js/thongtincanhan.js"></script>
</body>
</html>
