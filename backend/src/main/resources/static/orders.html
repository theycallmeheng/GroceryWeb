<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cửa hàng</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="css/bocuc.css">
    <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modern.css">
  <style>
    body { background-color: #f8f9fa; }
    .modal[style*="display: block"] { opacity: 1; background-color: rgba(0,0,0,0.5); display: block !important; overflow-x: hidden; overflow-y: auto; }
  </style>


<body>
  <header class="tieu-de shadow-sm" include-html="/components/header.html"></header>

  <div class="container py-5">
      <h2 class="mb-4 fw-bold">Đơn hàng của tôi</h2>
      <div class="card shadow-sm border-0">
          <div class="card-body p-0">
              <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                      <thead class="table-light">
                          <tr>
                              <th>Mã ĐH</th>
                              <th>Ngày đặt</th>
                              <th>Số điện thoại</th>
                              <th>Địa chỉ</th>
                              <th>Tổng tiền</th>
                              <th>Trạng thái</th>
                              <th class="text-end">Thao tác</th>
                          </tr>
                      </thead>
                      <tbody id="listOrder">
                      </tbody>
                  </table>
              </div>
          </div>
      </div>
  </div>

  <!-- Modal Chi tiết đơn hàng -->
  <div id="orderDetailModal" class="modal">
      <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content border-0 shadow">
              <div class="modal-header bg-light">
                  <h5 class="modal-title fw-bold">Chi tiết đơn hàng #<span id="detailOrderId" class="text-primary"></span></h5>
                  <button type="button" class="btn-close" onclick="closeOrderDetailModal()"></button>
              </div>
              <div class="modal-body">
                  <div id="orderDetailContent"></div>
              </div>
          </div>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/service.js"></script>
  <script src="js/script.js"></script>
  <script src="js/chung.js"></script>
</body>

<script>

  const statuses = [
      { id: 1, name: 'Chờ xác nhận' },
      { id: 2, name: 'Đang chuẩn bị hàng' },
      { id: 3, name: 'Đang giao hàng' },
      { id: 4, name: 'Giao thành công' },
      { id: 5, name: 'Đã hủy' }
  ];

  function domOrder(order) {
    const dsOrder = document.getElementById("listOrder");

    let orderPhone = order.phone || (order.users && order.users.phone) || 'N/A';
    let orderAddress = order.address || (order.users && order.users.address) || 'N/A';
    
    const statusId = order.status ? (order.status.id || order.status) : 1;
    const statusObj = statuses.find(s => s.id === parseInt(statusId));
    const statusName = statusObj ? statusObj.name : 'Chờ xác nhận';

    // Nút hủy đơn hàng: Chỉ hiển thị khi trạng thái là "Chờ xác nhận" (id = 1)
    let cancelBtnHtml = '';
    if (parseInt(statusId) === 1) {
        cancelBtnHtml = `<button onclick="cancelMyOrder(${order.id})" class="btn btn-sm btn-outline-danger ms-2"><i class="bi bi-x-circle me-1"></i>Hủy</button>`;
    }

    dsOrder.innerHTML += `
      <tr>
              <td><strong>#${order.id}</strong></td>
              <td>${new Date(order.createdAt).toLocaleDateString()}</td>
              <td>${orderPhone}</td>
              <td>${orderAddress}</td>
              <td class="text-primary fw-bold">${order.total.toLocaleString()} đ</td>           
              <td><span class="badge ${parseInt(statusId) === 1 ? 'bg-warning text-dark' : parseInt(statusId) === 4 ? 'bg-success' : parseInt(statusId) === 5 ? 'bg-danger' : 'bg-info'}">${statusName}</span></td>           
              <td class="text-end">
                <button onclick="viewOrderDetail(${order.id})" class="btn btn-sm btn-primary"><i class="bi bi-eye me-1"></i>Xem</button>
                ${cancelBtnHtml}
              </td>
            </tr>    
    `
  }


  async function loadOrder() {
    console.log("loadOrder");
    const orders = await getOrderService();
    console.log("Order", orders);
    orders.forEach(order => {
      domOrder(order);
    });
  }

  async function cancelMyOrder(orderId) {
    if (!confirm('Bạn có chắc chắn muốn hủy đơn hàng này không?')) return;
    
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`http://localhost:8081/api/orders/${orderId}/cancel`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        if (response.ok) {
            alert('Đã hủy đơn hàng thành công!');
            window.location.reload(); // Load lại trang để cập nhật lại trạng thái mới nhất
        } else {
            const data = await response.json();
            alert('Lỗi: ' + (data.error || data.message || 'Không thể hủy đơn hàng'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Lỗi kết nối Server!');
    }
  }

  async function viewOrderDetail(orderId) {
    const token = localStorage.getItem('token');
    try {
        const response = await fetch(`http://localhost:8081/api/orders/${orderId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const order = await response.json();
            document.getElementById('detailOrderId').innerText = order.id;

            // Tận dụng lại mảng statuses chuẩn trên frontend để fix lỗi sai trạng thái
            const statusId = order.status ? (order.status.id || order.status) : 1;
            const statusObj = statuses.find(s => s.id === parseInt(statusId));
            const statusName = statusObj ? statusObj.name : 'Chờ xác nhận';

            let orderPhone = order.phone || (order.users && order.users.phone) || 'N/A';
            let orderAddress = order.address || (order.users && order.users.address) || 'N/A';

            let content = `
                <div class="row mb-4 g-3">
                    <div class="col-md-6"><p class="mb-1 text-muted">Ngày đặt:</p><p class="fw-bold">${new Date(order.createdAt).toLocaleString() || 'N/A'}</p></div>
                    <div class="col-md-6"><p class="mb-1 text-muted">Số điện thoại:</p><p class="fw-bold">${orderPhone}</p></div>
                    <div class="col-md-12"><p class="mb-1 text-muted">Địa chỉ giao:</p><p class="fw-bold">${orderAddress}</p></div>
                    <div class="col-md-6"><p class="mb-1 text-muted">Trạng thái:</p><span class="badge bg-info fs-6">${statusName}</span></div>
                    <div class="col-md-6"><p class="mb-1 text-muted">Shipper:</p><p class="fw-bold">${order.shipper ? order.shipper.name + ' - ' + order.shipper.phone : 'Chưa phân công'}</p></div>
                </div>
                <h6 class="fw-bold mb-3">Danh sách sản phẩm:</h6>
                <div class="table-responsive"><table class="table table-bordered table-sm align-middle">
                    <thead class="table-light">
                        <tr><th>Sản phẩm</th><th class="text-center">Số lượng</th><th class="text-end">Đơn giá</th></tr>
                    </thead>
                    <tbody>
            `;
            
            const items = order.orderItems || [];
            if (items.length > 0) {
                items.forEach(item => {
                    const itemPrice = item.price || (item.product ? item.product.price : 'N/A');
                    const itemName = item.name || (item.product ? item.product.name : 'Sản phẩm');
                    content += `<tr><td>${itemName}</td><td class="text-center">${item.quantity}</td><td class="text-end">${itemPrice.toLocaleString()} đ</td></tr>`;
                });
            } else {
                content += `<tr><td colspan="3" style="text-align: center;">Không có chi tiết sản phẩm.</td></tr>`;
            }
            content += `</tbody></table></div><div class="text-end mt-3"><h5 class="fw-bold">Tổng tiền: <span class="text-primary">${order.total.toLocaleString()} đ</span></h5></div>`;
            document.getElementById('orderDetailContent').innerHTML = content;
            document.getElementById('orderDetailModal').style.display = 'block';
        } else {
            alert("Không thể tải chi tiết đơn hàng!");
        }
    } catch (error) {
        console.error("Lỗi kết nối API:", error);
    }
  }

  function closeOrderDetailModal() {
      document.getElementById('orderDetailModal').style.display = 'none';
  }

  loadOrder();
</script>

</html>
