<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/modern.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { max-width: 500px; width: 100%; border-radius: 15px; }
        .success-icon { font-size: 5rem; color: #198754; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card shadow-sm border-0 success-card mx-auto p-5">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill success-icon"></i>
            </div>
            <h2 class="fw-bold mb-3">Bạn đã đặt hàng thành công!</h2>
            <p class="text-muted mb-4 fs-5">Cảm ơn bạn đã tin tưởng mua sắm tại cửa hàng chúng tôi.</p>
            <p class="mb-4">Vào phần <strong>đơn hàng</strong> để xem chi tiết các đơn hàng của bạn.</p>
            <div class="d-grid gap-3">
                <a href="orders.html" class="btn btn-primary py-3 fw-bold fs-5">Xem đơn hàng của tôi</a>
                <a href="index.html" class="btn btn-outline-secondary py-3 fw-bold fs-5">Quay về trang chủ</a>
            </div>
        </div>
    </div>
</body>
</html>
