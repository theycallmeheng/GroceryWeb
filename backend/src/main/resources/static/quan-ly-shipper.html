<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Shipper - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f6f8; }
        .btn { padding: 6px 12px; cursor: pointer; border-radius: 4px; border: none; }
        .btn-add { background-color: #28a745; color: white; margin-bottom: 10px;}
        .btn-delete { background-color: #dc3545; color: white; }
        .btn-edit { background-color: #ffc107; color: black; }
    </style>
</head>
<body>
    <h2>Quản lý danh sách Shipper</h2>
    <button class="btn btn-add" onclick="alert('Form thêm mới sẽ được mở!')">+ Thêm Shipper mới</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Mã NV</th>
                <th>Tên NV</th>
                <th>Số điện thoại</th>
                <th>Địa chỉ</th>
                <th>Phương tiện</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="shipper-list">
            <!-- Dữ liệu từ API sẽ được JavaScript đổ vào đây -->
            <tr><td colspan="7" style="text-align: center;">Đang tải dữ liệu...</td></tr>
        </tbody>
    </table>

    <script src="/js/quan-ly-shipper.js"></script>
</body>
</html>
